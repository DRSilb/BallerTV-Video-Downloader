<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"> 
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 220px;
      padding: 16px;
      margin: 0;
      background-color: #f8fafc; 
      color: #334155;
    }

    button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      cursor: pointer;
      background-color: #2563eb; 
      color: white;
      border: none;
      border-radius: 8px; 
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2); 
      transition: all 0.2s ease; 
    }

    button:hover { 
      background-color: #1d4ed8; 
      box-shadow: 0 6px 8px -2px rgba(37, 99, 235, 0.3);
      transform: translateY(-1px); 
    }

    button:active {
      transform: translateY(1px); 
    }

    /* Both error messages share this exact same style */
    #error-msg, #not-found-msg {
      color: #dc2626;
      display: none;
      font-weight: 600;
      font-size: 14px;
      text-align: center;
      line-height: 1.4;
      padding: 4px;
      margin-bottom: 8px;
    }

    #menu-controls {
      display: none;
    }
  </style>
</head>
<body>

  <div id="error-msg">This extension only works on BallerTV.com</div>

  <div id="menu-controls">
    <div id="not-found-msg">🔍 Could not find an MP4 video on this page.</div>

    <button id="downloadBtn">Download Video</button>
    <button id="previewBtn">Preview in New Tab</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
